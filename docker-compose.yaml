services:
  litellm-proxy:
    image: ghcr.io/berriai/litellm:latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=sk-cowork-master-key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: --config /app/config.yaml
    restart: unless-stopped
